server:
  port: 8083

spring:
  application:
    name: jobs-service
  datasource:
    url: jdbc:postgresql://localhost:5432/catchandgo
    username: catchandgo
    password: catchandgo
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

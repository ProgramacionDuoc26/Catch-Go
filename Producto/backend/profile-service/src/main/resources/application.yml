server:
  port: 8082

logging:
  level:
    root: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: INFO

spring:
  application:
    name: profile-service
  datasource:
    url: jdbc:postgresql://localhost:5432/catchandgo
    username: catchandgo
    password: catchandgo
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
    table: flyway_schema_history_profiles
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

file:
  upload-dir: ${user.home}/catchgo-uploads

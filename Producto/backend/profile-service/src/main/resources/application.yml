server:
  port: ${SERVER_PORT:8082}

logging:
  level:
    root: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: INFO

spring:
  application:
    name: profile-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catchandgo}
    username: ${SPRING_DATASOURCE_USERNAME:catchandgo}
    password: ${SPRING_DATASOURCE_PASSWORD:catchandgo}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
    table: flyway_schema_history_profiles
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDISHOST:${REDIS_HOST:localhost}}}
      port: ${SPRING_DATA_REDIS_PORT:${REDISPORT:${REDIS_PORT:6379}}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}

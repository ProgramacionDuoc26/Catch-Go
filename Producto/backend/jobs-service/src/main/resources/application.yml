server:
  port: 8083

spring:
  application:
    name: jobs-service
  datasource:
    url: jdbc:postgresql://localhost:5432/catchandgo
    username: catchandgo
    password: catchandgo
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    repair-on-migrate: true
    validate-on-migrate: false
    table: flyway_schema_history_jobs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: matching-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catchandgo}
    username: ${SPRING_DATASOURCE_USERNAME:catchandgo}
    password: ${SPRING_DATASOURCE_PASSWORD:catchandgo}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDISHOST:${REDIS_HOST:localhost}}}
      port: ${SPRING_DATA_REDIS_PORT:${REDISPORT:${REDIS_PORT:6379}}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

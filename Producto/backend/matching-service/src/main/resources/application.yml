server:
  port: 8084

spring:
  application:
    name: matching-service
  datasource:
    url: jdbc:postgresql://localhost:5432/catchandgo
    username: catchandgo
    password: catchandgo
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
        - id: profile-service
          uri: ${PROFILE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/profiles/**
        - id: profile-files
          uri: ${PROFILE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/files/**
        - id: jobs-service
          uri: ${JOBS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/jobs/**
        - id: matching-service
          uri: ${MATCHING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/matching/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/ws-notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        # Apply CORS at the gateway routing layer for all routes.
        # Fine-grained enforcement is handled by CorsWebFilter in CorsConfig.
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:3000"
              - "https://localhost:3000"
              - "http://127.0.0.1:3000"
              - "https://*.up.railway.app"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - Content-Type
              - Authorization
              - Accept
              - Origin
              - Access-Control-Request-Method
              - Access-Control-Request-Headers
              - X-Requested-With
            exposed-headers:
              - Authorization
              - Content-Type
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service.railway.internal:8081}
          predicates:
            - Path=/auth/**
        - id: profile-service
          uri: ${PROFILE_SERVICE_URL:http://profile-service.railway.internal:8082}
          predicates:
            - Path=/profiles/**
        - id: profile-files
          uri: ${PROFILE_SERVICE_URL:http://profile-service.railway.internal:8082}
          predicates:
            - Path=/files/**
        - id: jobs-service
          uri: ${JOBS_SERVICE_URL:http://jobs-service.railway.internal:8083}
          predicates:
            - Path=/jobs/**
        - id: matching-service
          uri: ${MATCHING_SERVICE_URL:http://matching-service.railway.internal:8084}
          predicates:
            - Path=/matching/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service.railway.internal:8085}
          predicates:
            - Path=/ws-notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

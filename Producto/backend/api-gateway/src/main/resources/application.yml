server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: profile-service
          uri: http://localhost:8082
          predicates:
            - Path=/profiles/**
        - id: jobs-service
          uri: http://localhost:8083
          predicates:
            - Path=/jobs/**
        - id: matching-service
          uri: http://localhost:8084
          predicates:
            - Path=/matching/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

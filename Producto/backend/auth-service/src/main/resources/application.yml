server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/catchgo_db
    username: catchgo_admin
    password: admin_password_123
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    table: flyway_schema_history_auth
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  docs:
    storage-path: ${DOCS_STORAGE_PATH:./uploads/documentos}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
